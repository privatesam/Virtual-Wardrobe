version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    # No ports are exposed to the host, as Nginx will proxy requests.

volumes:
  backend-data:
    driver: local
